services:
  ex-files-pg:
    image: postgres
    restart: always
    ports:
      - ${PG_PORT:-5433}:5432
    environment:
      POSTGRES_USER: ${PG_USER:-admin}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-admin}
      POSTGRES_DB: ${PG_DB:-exfiles}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-admin} -d ${PG_DB:-exfiles}"]
      interval: 5s
      timeout: 3s
      retries: 5

  ex-files-minio:
    image: minio/minio
    restart: always
    ports:
      - ${MINIO_PORT:-9002}:9000
      - ${MINIO_CONSOLE_PORT:-9003}:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  ex-files-minio-init:
    image: minio/mc
    depends_on:
      ex-files-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://ex-files-minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/documents;
      exit 0;
      "

  ex-files-backend:
    build: ./ex-files-backend
    restart: always
    ports:
      - ${BACKEND_PORT:-8080}:8080
    environment:
      DB_DSN: host=ex-files-pg user=${PG_USER:-admin} password=${PG_PASSWORD:-admin} dbname=${PG_DB:-exfiles} port=5432 sslmode=disable TimeZone=UTC
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      MINIO_ENDPOINT: ex-files-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      MINIO_BUCKET: documents
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3003}
      GIN_MODE: release
    depends_on:
      ex-files-pg:
        condition: service_healthy
      ex-files-minio-init:
        condition: service_completed_successfully

  ex-files-frontend:
    build: ./ex-files-frontend
    restart: always
    ports:
      - ${FRONTEND_PORT:-3003}:3000
    environment:
      BACKEND_URL: http://ex-files-backend:8080
      ORIGIN: http://localhost:${FRONTEND_PORT:-3003}
    depends_on:
      - ex-files-backend

volumes:
  pgdata:
  miniodata:
