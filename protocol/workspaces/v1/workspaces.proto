syntax = "proto3";

package workspaces.v1;

option go_package = "github.com/spburtsev/ex-files-backend/gen/workspaces/v1;workspacesv1";

import "google/protobuf/timestamp.proto";
import "auth/v1/auth.proto";

// ---------------------------------------------------------------------------
// Domain objects
// ---------------------------------------------------------------------------

message Workspace {
  uint64                    id         = 1;
  string                    name       = 2;
  uint64                    manager_id = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message WorkspaceMember {
  uint64                    id           = 1;
  uint64                    workspace_id = 2;
  uint64                    user_id      = 3;
  google.protobuf.Timestamp created_at   = 4;
}

message WorkspaceDetail {
  Workspace          workspace = 1;
  auth.v1.User       manager   = 2;
  repeated auth.v1.User members = 3;
}

// ---------------------------------------------------------------------------
// CreateWorkspace  POST /workspaces
// ---------------------------------------------------------------------------

message CreateWorkspaceRequest {
  string name = 1;
}

message CreateWorkspaceResponse {
  Workspace workspace = 1;
}

// ---------------------------------------------------------------------------
// GetWorkspaces  GET /workspaces
// ---------------------------------------------------------------------------

message GetWorkspacesResponse {
  repeated Workspace workspaces = 1;
}

// ---------------------------------------------------------------------------
// GetWorkspace  GET /workspaces/:id
// ---------------------------------------------------------------------------

message GetWorkspaceResponse {
  WorkspaceDetail workspace = 1;
}

// ---------------------------------------------------------------------------
// UpdateWorkspace  PUT /workspaces/:id
// ---------------------------------------------------------------------------

message UpdateWorkspaceRequest {
  string name = 1;
}

message UpdateWorkspaceResponse {
  Workspace workspace = 1;
}

// ---------------------------------------------------------------------------
// DeleteWorkspace  DELETE /workspaces/:id
// ---------------------------------------------------------------------------

message DeleteWorkspaceResponse {
  string message = 1;
}

// ---------------------------------------------------------------------------
// AddMember  POST /workspaces/:id/members
// ---------------------------------------------------------------------------

message AddMemberRequest {
  uint64 user_id = 1;
}

message AddMemberResponse {
  WorkspaceMember member = 1;
}

// ---------------------------------------------------------------------------
// RemoveMember  DELETE /workspaces/:id/members/:userId
// ---------------------------------------------------------------------------

message RemoveMemberResponse {
  string message = 1;
}

// ---------------------------------------------------------------------------
// AssignableMembers  GET /workspaces/:id/assignable-members
// ---------------------------------------------------------------------------

message GetAssignableMembersResponse {
  repeated auth.v1.User users = 1;
}
